<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meander Water</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent;
            /* Arkası şeffaf olsun diye */
            font-family: sans-serif;
            cursor: grab;
        }

        body:active {
            cursor: grabbing;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <script type="module">
        import * as THREE from 'three';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        const scene = new THREE.Scene();
        const textureLoader = new THREE.TextureLoader();

        const bgTexture = textureLoader.load('abc.jpg');
        bgTexture.colorSpace = THREE.SRGBColorSpace;
        scene.background = bgTexture;

        const camera = new THREE.PerspectiveCamera(28, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 8.5);
        directionalLight.position.set(10, 10, 10);
        scene.add(directionalLight);

        const meanderGroup = new THREE.Group();
        meanderGroup.rotation.y = THREE.MathUtils.degToRad(20);
        meanderGroup.rotation.x = THREE.MathUtils.degToRad(100);
        scene.add(meanderGroup);

        const torusGeometry = new THREE.TorusGeometry(4, 0.4, 128, 564);
        const waterMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transmission: 1.0,
            metalness: 0.01,
            roughness: 0.0,
            ior: 1.333,
            thickness: 2.0,
            specularIntensity: 0.8,
            clearcoat: 0.6,
            clearcoatRoughness: 0.05,
            dispersion: 5.5,
            side: THREE.DoubleSide
        });

        waterMaterial.onBeforeCompile = function (shader) {
            shader.uniforms.uTime = { value: 0 };
            shader.vertexShader = 'uniform float uTime;\n' + shader.vertexShader;
            shader.vertexShader = shader.vertexShader.replace(
                '#include <begin_vertex>',
                `
                vec3 transformed = vec3(position);
                float angle = atan(position.y, position.x);
                float flow = angle * 2.0 + uTime * 3.0;
                float bulge = sin(angle * 3.0 - uTime * 1.5) * 0.15;
                bulge += cos(angle * 5.0 + uTime * 2.0) * 0.10;
                float ripple = sin(position.z * 4.0 + flow * 2.5) * 0.04;
                ripple += cos(position.x * 5.0 - uTime * 2.0) * 0.03;
                ripple += sin(position.y * 6.0 + uTime * 3.0) * 0.02;
                transformed += normal * (bulge + ripple);
                `
            );
            waterMaterial.userData.shader = shader;
        };

        const waterRing = new THREE.Mesh(torusGeometry, waterMaterial);
        meanderGroup.add(waterRing);

        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        window.addEventListener('pointerdown', () => { isDragging = true; });
        window.addEventListener('pointermove', (e) => {
            if (isDragging) {
                meanderGroup.rotation.y += (e.movementX) * 0.005;
                meanderGroup.rotation.x += (e.movementY) * 0.005;
            }
        });
        window.addEventListener('pointerup', () => { isDragging = false; });
        window.addEventListener('pointerleave', () => { isDragging = false; });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            waterRing.rotation.z = elapsedTime * 0.8;

            if (waterMaterial.userData.shader) {
                waterMaterial.userData.shader.uniforms.uTime.value = elapsedTime;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>

</body>

</html>
